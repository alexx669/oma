<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sorpresa Especial</title>
    <style>
        :root {
            --letter: #050510;
            --letra: #ff2b4a;
            --letter-love: 100vh;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: var(--letter);
            min-height: 100vh;
            overflow: hidden;
            font-family: sans-serif;
        }

        /* PANTALLA DE INICIO EXACTA */
        #inicio {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100vh;
            background: radial-gradient(circle, #1a0510 0%, var(--letter) 70%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 999;
            cursor: pointer;
            transition: opacity 0.7s ease;
        }
        #inicio h1 {
            color: var(--letra);
            font-size: 1.7rem;
            text-shadow: 0 0 12px var(--letra), 0 0 25px var(--letra);
            margin-bottom: 20px;
        }
        .imagen-centro {
            width: 140px;
            height: auto;
            filter: drop-shadow(0 0 10px var(--letra));
        }

        /* CLASE PRINCIPAL .Para_Ti IGUAL A SU ESTRUCTURA */
        .Para_Ti {
            position: absolute;
            width: 90%;
            top: 50%;
            left: 50%;
            transform: translateX(-50%) translateY(-50%);
            height: var(--letter-love);
            background: var(--letter);
            padding: 40px 20px;
            text-align: center;
            color: var(--letra);
        }

        /* FONDO DE LUCES/CORAZONES PEQUEÑOS */
        .fondo-luces {
            position: fixed;
            width: 100%; height: 100%;
            top: 0; left: 0;
            background-image: radial-gradient(circle, var(--letra) 1px, transparent 1px);
            background-size: 35px 35px;
            opacity: 0.12;
        }
        h2 {
            font-size: 2.2rem;
            text-shadow: 0 0 15px var(--letra);
            margin-bottom: 30px;
        }
        .mensaje-linea {
            font-size: 1.3rem;
            margin: 15px 0;
            text-shadow: 0 0 6px var(--letra);
        }
        .img-flotante {
            position: absolute;
            width: 55px;
        }
    </style>
</head>
<body>

<!-- PANTALLA INICIO -->
<div id="inicio">
    <h1>Toca para iniciar tu sorpresa</h1>
    <img src="hellokitty.png" class="imagen-centro" alt="Imagen especial">
</div>

<!-- CONTENIDO PRINCIPAL -->
<div class="fondo-luces"></div>
<div class="Para_Ti">
    <h2>¡FELIZ CUMPLEAÑOS!</h2>
    <p class="mensaje-linea">Que la pases genial 🎉</p>
    <p class="mensaje-linea">Te quiero muchísimo ❤️</p>
    <p class="mensaje-linea">Eres lo mejor 🫶</p>

    <!-- Imágenes flotando en bordes -->
    <img src="spiderman.png" class="img-flotante" style="top:10%; left:5%;" alt="">
    <img src="hellokitty.png" class="img-flotante" style="top:10%; right:5%;" alt="">
    <img src="spiderman.png" class="img-flotante" style="bottom:10%; left:5%;" alt="">
    <img src="hellokitty.png" class="img-flotante" style="bottom:10%; right:5%;" alt="">
</div>

<script>
// AL TOCAR SE QUITA LA PANTALLA DE INICIO SUAVEMENTE
document.getElementById('inicio').addEventListener('click', () => {
    document.getElementById('inicio').style.opacity = '0';
    setTimeout(() => document.getElementById('inicio').style.display = 'none', 700);
});
</script>

</body>
</html>
