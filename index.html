<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sorpresa para Raquel 🎁</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #fce4ec; /* Fondo más tierno, acorde al tema */
            overflow: hidden;
        }
        #introScreen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: #1a1a2e;
            color: #fff;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            cursor: pointer;
            transition: opacity 0.5s ease;
        }
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-12px); }
            100% { transform: translateY(0px); }
        }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.15); }
            100% { transform: scale(1); }
        }
        #introScreen img {
            animation: float 3s ease-in-out infinite;
            margin: 10px;
            max-width: 140px;
            border-radius: 12px;
        }
        .heart {
            color: #ff4d6d;
            font-size: 32px;
            animation: pulse 1.5s infinite;
            margin: 5px;
        }
        #mainContent {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            text-align: center;
            padding: 20px;
        }
        .message {
            margin: 12px 0;
            font-size: 22px;
            color: #5c0011;
            font-weight: 500;
        }
        h1 {
            color: #c9184a;
            font-size: 42px;
            margin-bottom: 25px;
        }
    </style>
</head>
<body>

    <div id="introScreen">
        <h1>Toca para iniciar tu sorpresa ❤️‍🩹</h1>
        <div>
            <span class="heart">❤</span>
            <!-- AQUÍ VAN TUS IMÁGENES, NÓMBRALAS IGUAL QUE AQUÍ -->
            <img src="hellokitty.png" alt="Hello Kitty" />
            <span class="heart">❤</span>
            <img src="spiderman.png" alt="Spider-Man" />
            <span class="heart">❤</span>
        </div>
    </div>

    <div id="mainContent">
        <h1>¡Sorpresa Raquel! 🎉</h1>
        <div class="message">¡Feliz cumpleaños! 🎂</div>
        <div class="message">Que la pases genial hoy ✨</div>
        <div class="message">Te quiero muchísimo 🫶</div>
        <div class="message">Eres lo mejor del mundo 🌎</div>
        <div class="message">Eres la mejor amiga que existe 💖</div>
        <div class="message">¡Qué genial eres! 😎</div>
        <div class="message">Feliz día, peliona 😜</div>
        <div class="message">I love you so much, peliona ❤️‍🩹</div>
    </div>

    <script>
        document.getElementById('introScreen').addEventListener('click', function() {
            this.style.opacity = 0;
            setTimeout(() => {
                this.style.display = 'none';
                document.body.style.overflow = 'auto';
            }, 500);
        });
    </script>
</body>
</html>
