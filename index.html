<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feliz Cumpleaños Raquel</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            font-family: Arial, sans-serif;
            background: radial-gradient(ellipse at center, #1b2735 0%, #090a0f 100%);
            color: #fff;
        }

        #stars {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        @keyframes float {
            0% { transform: translateY(100vh) scale(0); opacity: 1; }
            50% { opacity: 0.8; }
            100% { transform: translateY(-100px) scale(1); opacity: 0; }
        }

        .floating {
            position: absolute;
            z-index: 2;
            animation: float 6s infinite ease-in;
            color: #ffcc00;
            font-weight: bold;
        }

        .floating img {
            width: 50px;
            height: auto;
        }

        #center-message {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 10;
            text-align: center;
            font-size: 3rem;
            font-weight: bold;
            text-shadow: 0 0 20px #ff007f, 0 0 40px #7f00ff;
            animation: pulse 2s infinite alternate;
        }

        @keyframes pulse {
            0% { transform: translate(-50%, -50%) scale(1); }
            100% { transform: translate(-50%, -50%) scale(1.1); }
        }
    </style>
</head>
<body>

    <div id="stars"></div>

    <div id="center-message">
        ¡Feliz cumpleaños!
    </div>

    <script>
        const words = ["Amor", "Alegría", "Éxito", "Salud", "Paz"];
        const images = ["hellokitty.png", "spiderman.png"]; // Asegúrate de tener los nombres correctos

        function createFloatingElement() {
            const container = document.getElementById('stars');
            const div = document.createElement('div');
            div.className = 'floating';
            div.style.left = Math.random() * 100 + '%';
            
            if (Math.random() > 0.5) {
                div.innerText = words[Math.floor(Math.random() * words.length)];
                div.style.fontSize = (Math.random() * 20 + 15) + 'px';
            } else {
                const img = document.createElement('img');
                img.src = images[Math.floor(Math.random() * images.length)];
                div.appendChild(img);
            }

            container.appendChild(div);

            div.addEventListener('animationend', () => {
                div.remove();
            });
        }

        setInterval(createFloatingElement, 800);
    </script>
</body>
</html>
